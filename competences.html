<!DOCTYPE html>

<head>

    <title>Evan Reynaud | Compétences</title>
    <style>
        :root { --bg-color: #000000; --card-bg: #0d0d0d; --border-color: #262626; --text-primary: #ffffff; --text-secondary: #a3a3a3; --accent-color: #fff200; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: none; image-rendering: pixelated; }
        body { background-color: var(--bg-color); color: var(--text-primary); font-family: 'Determination', monospace, sans-serif; padding-top: 80px; display: flex; justify-content: center; min-height: 100vh; }
        .container { max-width: 800px; width: 100%; padding: 20px; }
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: var(--bg-color); border-bottom: 1px solid var(--border-color); padding: 20px; display: flex; justify-content: center; gap: 20px; z-index: 1000; }
        .navbar a { color: var(--text-secondary); text-decoration: none; font-size: 16px; text-transform: uppercase; }
        .navbar a:hover { color: var(--accent-color); }
        .skills-grid { display: flex; flex-wrap: wrap; gap: 12px; }
        .skill-tag { background: var(--card-bg); border: 1px solid var(--border-color); padding: 8px 16px; font-size: 14px; color: var(--text-secondary); }
        .portfolio-section h2 { font-size: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 25px; }
    </style>
</head>
